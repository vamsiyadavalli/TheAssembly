name: Workout Monitoring

on:
  workflow_dispatch:
  schedule:
    # 12:05 PM ET (during EDT)
    - cron: "5 16 * * *"
    # 9:05 PM ET (during EDT)
    - cron: "5 1 * * *"

concurrency:
  group: workout-monitoring
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.validate.outputs.status }}
      summary: ${{ steps.validate.outputs.summary }}

    steps:
      - name: Validate workouts and state files
        id: validate
        env:
          MONITOR_GITHUB_TOKEN: ${{ secrets.MONITOR_GITHUB_TOKEN }}
          WORKOUTS_REPO_OWNER: ${{ secrets.WORKOUTS_REPO_OWNER || 'vamsiyadavalli' }}
          WORKOUTS_REPO_NAME: ${{ secrets.WORKOUTS_REPO_NAME || 'TheAssemblyData' }}
          WORKOUTS_REPO_BRANCH: ${{ secrets.WORKOUTS_REPO_BRANCH || 'master' }}
          WORKOUTS_FILE_PATH: ${{ secrets.WORKOUTS_FILE_PATH || 'workouts.json' }}
          CURRENT_STATE_FILE_PATH: ${{ secrets.CURRENT_STATE_FILE_PATH || 'current_state.json' }}
          APP_TIMEZONE: ${{ secrets.APP_TIMEZONE || 'America/New_York' }}
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import urllib.parse
          import urllib.request
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          def set_output(name: str, value: str) -> None:
            with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"{name}<<EOF\n{value}\nEOF\n")

          token = os.getenv("MONITOR_GITHUB_TOKEN", "").strip()
          owner = os.getenv("WORKOUTS_REPO_OWNER", "").strip()
          repo = os.getenv("WORKOUTS_REPO_NAME", "").strip()
          branch = os.getenv("WORKOUTS_REPO_BRANCH", "master").strip() or "master"
          workouts_path = os.getenv("WORKOUTS_FILE_PATH", "workouts.json").strip() or "workouts.json"
          state_path = os.getenv("CURRENT_STATE_FILE_PATH", "current_state.json").strip() or "current_state.json"
          tz_name = os.getenv("APP_TIMEZONE", "America/New_York").strip() or "America/New_York"

          critical_errors: list[str] = []
          warnings: list[str] = []
          summary_lines: list[str] = []

          if not token:
            critical_errors.append("MONITOR_GITHUB_TOKEN is not configured.")

          if not owner or not repo:
            critical_errors.append("WORKOUTS_REPO_OWNER/WORKOUTS_REPO_NAME is not configured.")

          def fetch_contents(file_path: str) -> str:
            quoted = urllib.parse.quote(file_path.strip("/"))
            url = f"https://api.github.com/repos/{owner}/{repo}/contents/{quoted}?ref={branch}"
            req = urllib.request.Request(
              url,
              headers={
                "Accept": "application/vnd.github+json",
                "Authorization": f"Bearer {token}",
                "User-Agent": "TheAssembly-WorkoutMonitoring",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            )
            try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                payload = json.loads(resp.read().decode("utf-8"))
            except Exception as exc:  # noqa: BLE001
              raise RuntimeError(f"Failed to fetch {file_path}: {exc}") from exc

            encoded = payload.get("content", "")
            if not encoded:
              raise RuntimeError(f"GitHub returned empty content for {file_path}.")
            return base64.b64decode(encoded).decode("utf-8")

          workouts = []
          state = {}
          if not critical_errors:
            try:
              workouts_raw = fetch_contents(workouts_path)
              state_raw = fetch_contents(state_path)
            except RuntimeError as exc:
              critical_errors.append(str(exc))
            else:
              try:
                workouts = json.loads(workouts_raw)
              except json.JSONDecodeError as exc:
                critical_errors.append(f"{workouts_path} is not valid JSON: {exc}")

              try:
                state = json.loads(state_raw)
              except json.JSONDecodeError as exc:
                critical_errors.append(f"{state_path} is not valid JSON: {exc}")

          if not critical_errors:
            if not isinstance(workouts, list):
              critical_errors.append(f"{workouts_path} must be a JSON list.")

            if not isinstance(state, dict):
              critical_errors.append(f"{state_path} must be a JSON object.")

          if not critical_errors:
            required = {"date", "release_time", "stimulus", "technical_cues"}
            scheduled_dates = set()

            for idx, item in enumerate(workouts):
              if not isinstance(item, dict):
                critical_errors.append(f"Workout entry #{idx + 1} must be an object.")
                continue

              normalized = {str(k).strip().lower().replace(" ", "_"): v for k, v in item.items()}
              missing = required.difference(normalized)
              if missing:
                critical_errors.append(f"Workout entry #{idx + 1} missing fields: {sorted(missing)}")
                continue

              if "content" not in normalized and "workout_content" not in normalized:
                critical_errors.append(f"Workout entry #{idx + 1} missing content/workout_content.")
                continue

              try:
                date_value = str(normalized["date"]).strip()
                workout_date = datetime.fromisoformat(date_value).date()
              except Exception:  # noqa: BLE001
                critical_errors.append(f"Workout entry #{idx + 1} has invalid date: {normalized.get('date')}")
                continue

              scheduled_dates.add(workout_date)

            current_status = str(state.get("status", "")).strip().lower()
            if current_status not in {"open", "closed"}:
              critical_errors.append(f"{state_path} has invalid status: {current_status!r}")

            if not critical_errors:
              now_local = datetime.now(ZoneInfo(tz_name))
              today = now_local.date()
              tomorrow = today + timedelta(days=1)

              if today not in scheduled_dates:
                warnings.append(f"No workout scheduled for today ({today.isoformat()}).")
              if tomorrow not in scheduled_dates:
                warnings.append(f"No workout scheduled for tomorrow ({tomorrow.isoformat()}).")

              look_ahead = 14
              missing_look_ahead = []
              for offset in range(look_ahead + 1):
                target = today + timedelta(days=offset)
                if target not in scheduled_dates:
                  missing_look_ahead.append(target.isoformat())

              if missing_look_ahead:
                warnings.append(
                  f"Missing {len(missing_look_ahead)} workout date(s) in next {look_ahead + 1} days. "
                  f"First gaps: {', '.join(missing_look_ahead[:5])}"
                )

              summary_lines.append(f"Repository: {owner}/{repo}@{branch}")
              summary_lines.append(f"Validated workouts entries: {len(workouts)}")
              summary_lines.append(f"Current state: {current_status}")

          status = "success"
          if critical_errors:
            status = "critical"
          elif warnings:
            status = "warning"

          if critical_errors:
            summary_lines.append("")
            summary_lines.append("Critical issues:")
            summary_lines.extend(f"- {item}" for item in critical_errors)

          if warnings:
            summary_lines.append("")
            summary_lines.append("Warnings:")
            summary_lines.extend(f"- {item}" for item in warnings)

          if not summary_lines:
            summary_lines.append("No validation details were generated.")

          summary = "\n".join(summary_lines)
          set_output("status", status)
          set_output("summary", summary)
          PY

      - name: Publish summary
        run: |
          {
            echo "## Workout Monitoring"
            echo "Status: **${{ steps.validate.outputs.status }}**"
            echo
            echo "${{ steps.validate.outputs.summary }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail run on critical issues
        if: ${{ steps.validate.outputs.status == 'critical' }}
        run: |
          echo "Critical monitoring issues detected."
          exit 1

