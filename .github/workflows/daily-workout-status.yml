name: Daily Workout Status

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"

jobs:
  validate-workouts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate workouts.json and publish the next release summary
        env:
          APP_TIMEZONE: America/New_York
          WORKOUTS_FILE_PATH: workouts.json
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          timezone_name = "America/New_York"
          path = Path("workouts.json")
          if not path.exists():
              raise SystemExit("workouts.json is missing")

          data = json.loads(path.read_text())
          if not isinstance(data, list):
              raise SystemExit("workouts.json must be a list")

          required = {"date", "release_time", "stimulus", "technical_cues"}
          today = datetime.now(ZoneInfo(timezone_name)).date().isoformat()
          next_today = None

          for item in data:
              normalized = {str(k).strip().lower().replace(" ", "_"): v for k, v in item.items()}
              missing = required.difference(normalized)
              if missing:
                  raise SystemExit(f"Missing required fields: {sorted(missing)}")
              if "content" not in normalized and "workout_content" not in normalized:
                  raise SystemExit("Missing required field: content")
              if normalized["date"] == today:
                  next_today = normalized["release_time"]

          summary = "No workout scheduled for today."
          if next_today:
              summary = f"Today's workout releases at {next_today} ({timezone_name})."

          with open("summary.txt", "w", encoding="utf-8") as handle:
              handle.write(summary + "\n")
          PY
      - name: Publish summary
        run: cat summary.txt >> "$GITHUB_STEP_SUMMARY"
