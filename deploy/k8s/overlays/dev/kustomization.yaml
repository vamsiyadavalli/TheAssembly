apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
bases:
  - ../../base
patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: athlete
      namespace: theassembly-apps
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: admin
      namespace: theassembly-apps
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: mcp-playwright
      namespace: theassembly-mcp
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: mcp-pyright
      namespace: theassembly-mcp
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
# Exclude Ingress resources from dev overlay (use internal service discovery only)
resources: []
patchesStrategicMerge: []
