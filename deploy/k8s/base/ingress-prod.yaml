apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prod-ingress
  namespace: theassembly-apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - asm-athlete.theassembly.app
    - asm-control.theassembly.app
    secretName: prod-tls-cert
  rules:
  - host: asm-athlete.theassembly.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: athlete
            port:
              number: 8501
  - host: asm-control.theassembly.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin
            port:
              number: 8501
