apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: theassembly-apps
  labels:
    app.kubernetes.io/name: admin
    app.kubernetes.io/part-of: theassembly
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin
        app.kubernetes.io/part-of: theassembly
    spec:
      containers:
        - name: admin
          image: ghcr.io/your-org/theassembly:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - streamlit
            - run
            - admin_app.py
            - --server.address=0.0.0.0
            - --server.port=8501
          ports:
            - containerPort: 8501
              name: http
          envFrom:
            - configMapRef:
                name: theassembly-config
            - secretRef:
                name: theassembly-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: theassembly-apps
spec:
  selector:
    app.kubernetes.io/name: admin
  ports:
    - name: http
      port: 8501
      targetPort: http
      protocol: TCP
