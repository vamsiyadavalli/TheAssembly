apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-pyright
  namespace: theassembly-mcp
  labels:
    app.kubernetes.io/name: mcp-pyright
    app.kubernetes.io/part-of: theassembly
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-pyright
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-pyright
        app.kubernetes.io/part-of: theassembly
    spec:
      containers:
        - name: mcp-pyright
          image: ghcr.io/your-org/mcp-pyright:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8932
              name: mcp
          env:
            - name: MCP_PORT
              value: "8932"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-pyright
  namespace: theassembly-mcp
spec:
  selector:
    app.kubernetes.io/name: mcp-pyright
  ports:
    - name: mcp
      port: 8932
      targetPort: mcp
      protocol: TCP
