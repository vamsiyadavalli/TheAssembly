apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-playwright
  namespace: theassembly-mcp
  labels:
    app.kubernetes.io/name: mcp-playwright
    app.kubernetes.io/part-of: theassembly
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-playwright
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-playwright
        app.kubernetes.io/part-of: theassembly
    spec:
      containers:
        - name: mcp-playwright
          image: ghcr.io/your-org/mcp-playwright:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8931
              name: mcp
          env:
            - name: MCP_PORT
              value: "8931"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-playwright
  namespace: theassembly-mcp
spec:
  selector:
    app.kubernetes.io/name: mcp-playwright
  ports:
    - name: mcp
      port: 8931
      targetPort: mcp
      protocol: TCP
